
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Archidekt Token Extractor</title>
<style>
  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    max-width: 1100px;
    margin: auto;
    padding: 20px;
    background: #020617;
    color: #e5e7eb;
  }
  h1, h2 {
    font-weight: 600;
  }
  input, button {
    padding: 10px;
    font-size: 16px;
    border-radius: 4px;
    border: 1px solid #4b5563;
    box-sizing: border-box;
  }
  input {
    width: 100%;
    background: #020617;
    color: #e5e7eb;
  }
  button {
    margin-top: 10px;
    background: #2563eb;
    color: white;
    cursor: pointer;
  }
  button:disabled {
    background: #374151;
    cursor: default;
  }
  #progressContainer {
    margin-top: 15px;
    background: #0f172a;
    border-radius: 4px;
    overflow: hidden;
    height: 16px;
    display: none;
  }
  #progressBar {
    height: 100%;
    width: 0%;
    background: #22c55e;
    transition: width 0.15s linear;
  }
  #status {
    margin-top: 8px;
    font-size: 14px;
    color: #9ca3af;
    white-space: pre-wrap;
  }
  #gallery {
    margin-top: 25px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 16px;
  }
  .token-card {
    background: #020617;
    border-radius: 6px;
    padding: 10px;
    border: 1px solid #1f2937;
  }
  .token-title {
    font-size: 14px;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .variant {
    display: flex;
    align-items: flex-start;
    gap: 6px;
    margin-bottom: 6px;
  }
  .variant img {
    width: 80px;
    border-radius: 4px;
    border: 1px solid #374151;
    background: #020617;
  }
  .variant-info {
    font-size: 12px;
    color: #d1d5db;
  }
  .variant input {
    margin-top: 4px;
  }
  #downloadBtn {
    margin-top: 20px;
    display: none;
  }
  a.download-link {
    display: inline-block;
    margin-top: 10px;
    color: #22c55e;
    text-decoration: none;
    font-weight: 500;
  }
</style>
</head>
<body>

<h1>Archidekt Token Extractor</h1>
<p>Paste an Archidekt deck URL, scan tokens, choose your preferred token printings, then download a CSV.</p>

<input id="deckUrl" placeholder="https://archidekt.com/decks/21948302/withering_my_tokens">
<button id="scanBtn">Scan Deck & Build Token Gallery</button>

<div id="progressContainer">
  <div id="progressBar"></div>
</div>
<div id="status"></div>

<h2 id="galleryTitle" style="display:none; margin-top:24px;">Token Gallery (choose a version for each token)</h2>
<div id="gallery"></div>

<button id="downloadBtn">Download CSV</button>
<div id="downloadArea"></div>

<script>
// ---------- Progress + utils ----------

let totalSteps = 1;
let currentStep = 0;

function resetProgress() {
  totalSteps = 1;
  currentStep = 0;
  document.getElementById("progressContainer").style.display = "block";
  document.getElementById("progressBar").style.width = "0%";
  document.getElementById("status").textContent = "";
}

function step(msg) {
  currentStep++;
  const pct = Math.min(100, (currentStep / totalSteps) * 100);
  document.getElementById("progressBar").style.width = pct + "%";
  document.getElementById("status").textContent = msg;
}

function extractDeckId(url) {
  const match = url.match(/\/decks\/(\d+)/);
  if (match) return match[1];
  if (/^\d+$/.test(url)) return url;
  throw new Error("Invalid Archidekt URL or deck ID");
}

function safeName(s) {
  return s.toLowerCase().replace(/ /g, "_").replace(/\//g, "_");
}

async function fetchJson(url, retries = 5) {
  for (let i = 0; i < retries; i++) {
    const r = await fetch(url);
    if (r.status === 429) {
      await new Promise(res => setTimeout(res, 300 + i * 300));
      continue;
    }
    if (!r.ok) return null;
    return await r.json();
  }
  return null;
}

function colorCodeFromIdentity(colors) {
  const map = { W: "w", U: "u", B: "b", R: "r", G: "g" };
  if (!colors || !colors.length) return "c";
  return colors.map(c => map[c] || "").join("") || "c";
}

// ---------- Scryfall card + token lookup ----------

async function scryfallCard(name) {
  const url = "https://api.scryfall.com/cards/search?q=" +
    encodeURIComponent(`!"${name}" unique:prints`);
  const data = await fetchJson(url);
  if (!data || !data.data || !data.data.length) return null;

  const oracle = data.data.find(c => c.oracle_id);
  if (oracle) return oracle;

  const withParts = data.data.find(c => c.all_parts);
  if (withParts) return withParts;

  return data.data[0];
}

function tokensFromAllParts(cardJson) {
  const tokens = [];
  if (!cardJson.all_parts) return tokens;
  for (const part of cardJson.all_parts) {
    if (part.component === "token") {
      tokens.push(part.uri);
    }
  }
  return tokens;
}

async function getTokenVariantsFromUri(uri) {
  const base = await fetchJson(uri);
  if (!base) return [];

  const oracleId = base.oracle_id;
  let searchUrl = base.prints_search_uri;
  if (!searchUrl && oracleId) {
    searchUrl = "https://api.scryfall.com/cards/search?order=released&q=" +
      encodeURIComponent(`oracleid:${oracleId} layout:token`) +
      "&unique=prints";
  }
  if (!searchUrl) return [base];

  const data = await fetchJson(searchUrl);
  if (!data || !data.data) return [base];

  const variants = data.data.filter(c =>
    c.layout === "token" || (c.type_line && c.type_line.includes("Token"))
  );
  return variants.length ? variants : [base];
}

// ---------- State ----------

const scanBtn = document.getElementById("scanBtn");
const downloadBtn = document.getElementById("downloadBtn");
const galleryDiv = document.getElementById("gallery");
const galleryTitle = document.getElementById("galleryTitle");
const downloadArea = document.getElementById("downloadArea");

let deckNameGlobal = "tokens";
let tokenDataByName = {};   // name -> { base, variants: [...] }
let tokenSelection = {};    // name -> index

// ---------- Main workflow ----------

scanBtn.addEventListener("click", async () => {
  const url = document.getElementById("deckUrl").value.trim();
  if (!url) {
    alert("Please paste an Archidekt deck URL.");
    return;
  }

  scanBtn.disabled = true;
  downloadBtn.style.display = "none";
  galleryDiv.innerHTML = "";
  galleryTitle.style.display = "none";
  downloadArea.innerHTML = "";
  resetProgress();

  try {
    const deckId = extractDeckId(url);
    step("Fetching deck from Archidekt export endpoint...");
    const deck = await fetchJson(`https://archidekt.com/api/decks/${deckId}/export/json/`);
    if (!deck) throw new Error("Failed to fetch deck data.");

    deckNameGlobal = safeName(deck.name || "tokens");

    const allCards = []
      .concat(deck.mainboard || [])
      .concat(deck.sideboard || []);

    const cardNames = [...new Set(
      allCards
        .map(c => c.card && c.card.oracleCard && c.card.oracleCard.name)
        .filter(Boolean)
    )];

    totalSteps = cardNames.length + 1;
    step(`Found ${cardNames.length} unique cards. Fetching Scryfall data...`);

    const tokenUris = new Set();
    const failedCards = [];

    for (const name of cardNames) {
      step(`Card: ${name}`);
      const cardJson = await scryfallCard(name);
      if (!cardJson) {
        failedCards.push(name);
        continue;
      }
      const tokens = tokensFromAllParts(cardJson);
      if (!tokens.length) {
        failedCards.push(name);
      } else {
        tokens.forEach(u => tokenUris.add(u));
      }
    }

    const urisArray = Array.from(tokenUris);
    totalSteps = currentStep + urisArray.length * 2;

    tokenDataByName = {};
    tokenSelection = {};

    for (const uri of urisArray) {
      step("Fetching token variants...");
      const variants = await getTokenVariantsFromUri(uri);
      if (!variants.length) continue;

      const base = variants[0];
      const name = safeName(base.name || "unknown");
      const power = base.power || "token";
      const tough = base.toughness || "token";
      const color = colorCodeFromIdentity(base.color_identity || []);

      if (!tokenDataByName[name]) {
        tokenDataByName[name] = {
          base: { name, power, tough, color },
          variants: []
        };
      }

      for (const v of variants) {
        step("Processing token variant...");
        const img = v.image_uris?.normal || v.image_uris?.png || v.image_uris?.large || "";
        tokenDataByName[name].variants.push({
          set: v.set || "",
          collector_number: v.collector_number || "",
          image: img,
          uri: v.uri,
          power: v.power || power,
          tough: v.tough || tough,
          color: colorCodeFromIdentity(v.color_identity || [])
        });
      }
    }

    buildGallery();
    galleryTitle.style.display = "block";
    downloadBtn.style.display = "inline-block";
    step("Done. Review tokens and choose versions, then download CSV.");

  } catch (e) {
    document.getElementById("status").textContent = "Error: " + e.message;
  } finally {
    scanBtn.disabled = false;
  }
});

// ---------- Gallery ----------

function buildGallery() {
  galleryDiv.innerHTML = "";
  tokenSelection = {};

  const names = Object.keys(tokenDataByName).sort();
  for (const name of names) {
    const token = tokenDataByName[name];
    const cardDiv = document.createElement("div");
    cardDiv.className = "token-card";

    const title = document.createElement("div");
    title.className = "token-title";
    title.textContent = `${name} (${token.base.power}/${token.base.tough}, ${token.base.color})`;
    cardDiv.appendChild(title);

    tokenSelection[name] = 0;

    token.variants.forEach((v, idx) => {
      const variantDiv = document.createElement("div");
      variantDiv.className = "variant";

      const radio = document.createElement("input");
      radio.type = "radio";
      radio.name = `token-${name}`;
      radio.value = idx;
      radio.checked = idx === 0;
      radio.addEventListener("change", () => {
        tokenSelection[name] = idx;
      });

      const img = document.createElement("img");
      if (v.image) img.src = v.image;

      const info = document.createElement("div");
      info.className = "variant-info";
      info.innerHTML =
        `Set: ${v.set.toUpperCase()}<br>` +
        `Collector #: ${v.collector_number || "?"}<br>` +
        `Power/Tough: ${v.power}/${v.tough}<br>` +
        `Color: ${v.color}`;

      variantDiv.appendChild(radio);
      variantDiv.appendChild(img);
      variantDiv.appendChild(info);

      cardDiv.appendChild(variantDiv);
    });

    galleryDiv.appendChild(cardDiv);
  }
}

// ---------- CSV download ----------

downloadBtn.addEventListener("click", () => {
  const rows = [];
  const names = Object.keys(tokenDataByName).sort();

  for (const name of names) {
    const token = tokenDataByName[name];
    const idx = tokenSelection[name] ?? 0;
    const v = token.variants[idx] || token.variants[0];

    const base = token.base;
    const power = v.power || base.power;
    const tough = v.tough || base.tough;
    const color = v.color || base.color;

    const version = String(idx + 1);
    const filename =
      power === "token"
        ? `${name}_token_${color}_${version}.png`
        : `${name}_${power}_${tough}_${color}_${version}.png`;

    rows.push([filename, name, power, tough, color, version]);
  }

  const csvContent = rows.map(r => r.join(",")).join("\n");
  const blob = new Blob([csvContent], { type: "text/csv" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = `${deckNameGlobal}.csv`;
  link.textContent = "Download CSV";
  link.className = "download-link";

  downloadArea.innerHTML = "";
  downloadArea.appendChild(link);
});
</script>

</body>
</html>
